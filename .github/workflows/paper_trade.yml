name: Alpaca Daily Paper Trader

on:
  schedule:
    # Runs at 21:05 UTC (which is 4:05 PM EST, Monday through Friday)
    # This aligns perfectly with the stock market close.
    - cron: '5 21 * * 1-5'
  workflow_dispatch: # Allows you to trigger the trade manually from GitHub UI if wanted

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Paper Trader
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          PYTHONPATH=. python paper_trader.py
